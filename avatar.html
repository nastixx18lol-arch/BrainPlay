{% extends "base.html" %}
{% block content %}
<div class="card">
    <h2>Выбери своего героя!</h2>
    <div class="avatar-selection">
        <form action="/save_avatar" method="POST">
            <button type="submit" name="avatar" value="boy" class="avatar-btn">
                <span class="emoji">🐸👦</span>
                <p>Лягушонок</p>
            </button>
            <button type="submit" name="avatar" value="girl" class="avatar-btn">
                <span class="emoji">🐸👧</span>
                <p>Лягушка</p>
            </button>
        </form>
    </div>
</div>
{% endblock %}
